<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player">

    <div class="art-wrapper">
      <img id="cover" class="cover" src="" alt="Album art">
    </div>

    <h2 id="songTitle">Song Title</h2>
    <p id="songArtist">Artist</p>

    <div class="progress-section">
      <span id="currentTime">0:00</span>
      <input type="range" id="seekBar" value="0" min="0" max="100" step="0.1">
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button id="shuffleBtn" class="icon-btn" title="Shuffle">🔀</button>
      <button id="prevBtn" class="icon-btn" title="Previous">⏮</button>
      <button id="playBtn" class="icon-btn play-btn" title="Play/Pause">▶</button>
      <button id="nextBtn" class="icon-btn" title="Next">⏭</button>
      <button id="repeatBtn" class="icon-btn" title="Repeat">🔁</button>
    </div>

    <div class="volume-section">
      <span>🔉</span>
      <input type="range" id="volumeBar" value="70" min="0" max="100">
    </div>

    <div class="playlist" id="playlist">
    </div>

  </div>

  <audio id="audio"></audio>

  <script src="script.js"></script>
</body>
</html>
